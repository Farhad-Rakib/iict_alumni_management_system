# Production Docker Compose Configuration - with Containerized PostgreSQL.
# PostgreSQL runs in a container as part of the docker-compose setup.

version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: alumni_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alumni_network
    restart: always

  # Backend API
  backend:
    build:
      context: ./tms_be
      dockerfile: Dockerfile
    container_name: alumni_backend_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/alumni_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?error}
      DEBUG: "False"
      CORS_ORIGINS: ${CORS_ORIGINS:?error}
      SMTP_SERVER: ${SMTP_SERVER:?error}
      SMTP_USER: ${SMTP_USER:?error}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?error}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  # Frontend UI
  frontend:
    build:
      context: ./tms_ui
      dockerfile: Dockerfile
    container_name: alumni_frontend_prod
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  redis_data_prod:
    driver: local

networks:
  alumni_network:
    driver: bridge

# NOTE: PostgreSQL is on host machine, not containerized
