# Production Docker Compose for Contabo VPS - Without PostgreSQL
# PostgreSQL is installed physically on the VPS
# Redis can also be installed physically or run in Docker
# Custom ports allow multiple projects on same VPS

version: '3.8'

services:
  # Backend API
  backend:
    image: ghcr.io/farhad-rakib/iict_alumni_management_system/alumni-backend:latest
    container_name: alumni_backend_prod
    environment:
      # PostgreSQL - installed physically on VPS
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
      # Redis - can be Docker container or physical installation
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379/0}
      SECRET_KEY: ${SECRET_KEY:?error}
      DEBUG: "False"
      CORS_ORIGINS: ${CORS_ORIGINS:?error}
      SMTP_SERVER: ${SMTP_SERVER:?error}
      SMTP_USER: ${SMTP_USER:?error}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?error}
      ENVIRONMENT: production
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend UI
  frontend:
    image: ghcr.io/farhad-rakib/iict_alumni_management_system/alumni-frontend:latest
    container_name: alumni_frontend_prod
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:?error}
      VITE_APP_NAME: ${VITE_APP_NAME:?error}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

networks:
  alumni_network:
    driver: bridge

