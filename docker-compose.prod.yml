# Production Docker Compose Configuration - with Containerized PostgreSQL.
# PostgreSQL runs in a container as part of the docker-compose setup.

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: tms_db_prod
    environment:
      POSTGRES_DB: ${DB_NAME:?error}
      POSTGRES_USER: ${DB_USER:?error}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?error}
      POSTGRES_INITDB_ARGS: "-c timezone=UTC"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: alumni_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?error}
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alumni_network
    restart: always

  # Backend API
  backend:
    build:
      context: ./tms_be
      dockerfile: Dockerfile
    container_name: alumni_backend_prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@postgres:5432/alumni_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?error}
      DEBUG: "False"
      CORS_ORIGINS: ${CORS_ORIGINS:?error}
      SMTP_SERVER: ${SMTP_SERVER:?error}
      SMTP_USER: ${SMTP_USER:?error}
      SMTP_PASSWORD: ${SMTP_PASSWORD:?error}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  # Frontend UI
  frontend:
    build:
      context: ./tms_ui
      dockerfile: Dockerfile
    container_name: alumni_frontend_prod
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - alumni_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  alumni_network:
    driver: bridge

# PostgreSQL Database: Containerized with persistent storage
# Redis Cache: Containerized with persistent storage
# All services are health-checked before dependent services start

