# Docker Compose for full stack - with containerized PostgreSQL and pgAdmin4.
# All services run in containers and communicate through a shared network (alumni_network).

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: alumni_postgres
    environment:
      POSTGRES_DB: alumni_db
      POSTGRES_USER: alumni_user
      POSTGRES_PASSWORD: secure_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alumni_user -d alumni_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alumni_network
    restart: unless-stopped

  # pgAdmin4 for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: alumni_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@alumni.com
      PGADMIN_DEFAULT_PASSWORD: admin_password_change_me
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - alumni_network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: alumni_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alumni_network

  # Backend API
  backend:
    build:
      context: ./tms_be
      dockerfile: Dockerfile
    container_name: alumni_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://alumni_user:secure_password_change_me@postgres:5432/alumni_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: your-secret-key-change-in-production
      DEBUG: "False"
      CORS_ORIGINS: '["http://localhost:5173", "http://localhost:5174", "http://localhost:5175", "http://127.0.0.1:5173", "http://127.0.0.1:5174", "http://127.0.0.1:5175", "http://localhost:3000", "http://127.0.0.1:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./tms_be:/app
    networks:
      - alumni_network
    restart: unless-stopped

  # Frontend UI
  frontend:
    build:
      context: ./tms_ui
      dockerfile: Dockerfile
    container_name: alumni_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - alumni_network
    restart: unless-stopped

networks:
  alumni_network:
    driver: bridge

volumes:
  postgres_data:
